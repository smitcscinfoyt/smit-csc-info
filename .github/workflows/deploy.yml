name: Deploy to Oracle VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sudo sh
            fi

            if ! docker compose version &> /dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            sudo chmod 666 /var/run/docker.sock 2>/dev/null || true
            docker network create proxy-net 2>/dev/null || true

            APP_DIR="$HOME/smit-csc-info"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/smitcscinfoyt/smit-csc-info.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main
            git clean -fd --exclude=.env

            printf '' > "$APP_DIR/.env"
            echo "NODE_ENV=production" >> "$APP_DIR/.env"
            echo "PHONEPE_BASE_URL=https://api.phonepe.com/apis/hermes" >> "$APP_DIR/.env"
            echo "PHONEPE_CLIENT_VERSION=1" >> "$APP_DIR/.env"
            echo "SITE_URL=${{ secrets.ENV_SITE_URL }}" >> "$APP_DIR/.env"
            echo "DATABASE_URL=${{ secrets.ENV_DATABASE_URL }}" >> "$APP_DIR/.env"
            echo "SESSION_SECRET=${{ secrets.ENV_SESSION_SECRET }}" >> "$APP_DIR/.env"
            echo "PHONEPE_MERCHANT_ID=${{ secrets.ENV_PHONEPE_MERCHANT_ID }}" >> "$APP_DIR/.env"
            echo "PHONEPE_CLIENT_SECRET=${{ secrets.ENV_PHONEPE_CLIENT_SECRET }}" >> "$APP_DIR/.env"

          # Configure system nginx to forward to Docker containers
          sudo tee /etc/nginx/sites-available/smit-csc-info > /dev/null << 'NGINXEOF'
  server {
    listen 80;
    server_name smitcscinfo.com www.smitcscinfo.com;
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
NGINXEOF
            sudo ln -sf /etc/nginx/sites-available/smit-csc-info /etc/nginx/sites-enabled/smit-csc-info
            sudo nginx -t && sudo systemctl reload nginx || true            
            chmod +x "$APP_DIR/deploy.sh"
            "$APP_DIR/deploy.sh"
