name: Deploy to Oracle VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sudo sh
            fi

            if ! docker compose version &> /dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            sudo chmod 666 /var/run/docker.sock 2>/dev/null || true
            docker network create proxy-net 2>/dev/null || true

            APP_DIR="$HOME/smit-csc-info"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/smitcscinfoyt/smit-csc-info.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main
            git clean -fd --exclude=.env

                        printf '' > "$APP_DIR/.env"
            echo "NODE_ENV=production" >> "$APP_DIR/.env"
            echo "APP_URL=https://smitcscinfo.com" >> "$APP_DIR/.env"
            echo "SITE_URL=${{ secrets.ENV_SITE_URL }}" >> "$APP_DIR/.env"
            echo "DATABASE_URL=postgresql://csc_admin:secure_db_password@db:5432/smit_csc" >> "$APP_DIR/.env"
            echo "SESSION_SECRET=${{ secrets.ENV_SESSION_SECRET }}" >> "$APP_DIR/.env"
            echo "PHONEPE_MERCHANT_ID=${{ secrets.ENV_PHONEPE_MERCHANT_ID }}" >> "$APP_DIR/.env"
            echo "PHONEPE_CLIENT_SECRET=${{ secrets.ENV_PHONEPE_CLIENT_SECRET }}" >> "$APP_DIR/.env"
            echo "PHONEPE_CLIENT_ID=${{ secrets.ENV_PHONEPE_CLIENT_ID }}" >> "$APP_DIR/.env"
                        echo "PHONEPE_CLIENT_ID=${{ secrets.ENV_PHONEPE_CLIENT_ID }}" >> "$APP_DIR/.env"
            echo "PHONEPE_CLIENT_VERSION=1" >> "$APP_DIR/.env"
            echo "PHONEPE_BASE_URL=https://api.phonepe.com/apis/pg" >> "$APP_DIR/.env"
            echo "SMTP_HOST=smtp.gmail.com" >> "$APP_DIR/.env"
            echo "SMTP_PORT=587" >> "$APP_DIR/.env"
            echo "SMTP_USER=${{ secrets.ENV_SMTP_USER }}" >> "$APP_DIR/.env"
            echo "SMTP_PASS=${{ secrets.ENV_SMTP_PASS }}" >> "$APP_DIR/.env"
            echo "SMTP_FROM=Smit CSC Info <admin@smitcscinfo.com>" >> "$APP_DIR/.env"
            echo "ADMIN_EMAIL=admin@smitcscinfo.com" >> "$APP_DIR/.env"
            echo "A1TOPUP_USERNAME=${{ secrets.ENV_A1TOPUP_USERNAME }}" >> "$APP_DIR/.env"
            echo "A1TOPUP_PASSWORD=${{ secrets.ENV_A1TOPUP_PASSWORD }}" >> "$APP_DIR/.env"
            echo "A1TOPUP_BASE_URL=${{ secrets.ENV_A1TOPUP_BASE_URL }}" >> "$APP_DIR/.env"
            echo "A1TOPUP_WEBHOOK_SECRET=${{ secrets.ENV_A1TOPUP_WEBHOOK_SECRET }}" >> "$APP_DIR/.env"
                        echo "PHONEPE_WEBHOOK_USERNAME=${{ secrets.ENV_PHONEPE_WEBHOOK_USERNAME }}" >> "$APP_DIR/.env"
            echo "PHONEPE_WEBHOOK_PASSWORD=${{ secrets.ENV_PHONEPE_WEBHOOK_PASSWORD }}" >> "$APP_DIR/.env"
            echo "LOG_LEVEL=info" >> "$APP_DIR/.env"
                        echo "GOOGLE_VISION_API_KEY=${{ secrets.ENV_GOOGLE_VISION_API_KEY }}" >> "$APP_DIR/.env"
            echo "AI_INTEGRATIONS_GEMINI_BASE_URL=${{ secrets.ENV_GEMINI_BASE_URL }}" >> "$APP_DIR/.env"
            echo "AI_INTEGRATIONS_GEMINI_API_KEY=${{ secrets.ENV_GEMINI_API_KEY }}" >> "$APP_DIR/.env"
            echo "REMOVE_BG_API_KEY=${{ secrets.ENV_REMOVE_BG_API_KEY }}" >> "$APP_DIR/.env"
            echo "YOUTUBE_API_KEY=${{ secrets.ENV_YOUTUBE_API_KEY }}" >> "$APP_DIR/.env"
            echo "DATA_GOV_IN_API_KEY=${{ secrets.ENV_DATA_GOV_IN_API_KEY }}" >> "$APP_DIR/.env"
            echo "OPENWEATHER_API_KEY=${{ secrets.ENV_OPENWEATHER_API_KEY }}" >> "$APP_DIR/.env"
            echo "PIXABAY_API_KEY=${{ secrets.ENV_PIXABAY_API_KEY }}" >> "$APP_DIR/.env"
            echo "UNSPLASH_ACCESS_KEY=${{ secrets.ENV_UNSPLASH_ACCESS_KEY }}" >> "$APP_DIR/.env"
            echo "NEWSAPI_AI_KEY=${{ secrets.ENV_NEWSAPI_AI_KEY }}" >> "$APP_DIR/.env"
            echo "EZYTM_API_USERID=${{ secrets.EZYTM_API_USERID }}" >> "$APP_DIR/.env"
            echo "EZYTM_API_PASSWORD=${{ secrets.EZYTM_API_PASSWORD }}" >> "$APP_DIR/.env"

                        # Configure system nginx
            sudo cp "$APP_DIR/system-nginx.conf" /etc/nginx/sites-available/smit-csc-info
            sudo ln -sf /etc/nginx/sites-available/smit-csc-info /etc/nginx/sites-enabled/smit-csc-info
            sudo nginx -t && sudo systemctl reload nginx || true

                        # Install SSL certificate
            if ! command -v certbot &> /dev/null; then
              sudo apt-get install -y certbot python3-certbot-nginx
            fi
            sudo certbot --nginx -d smitcscinfo.com -d www.smitcscinfo.com --non-interactive --agree-tos -m smitcscinfoyt@gmail.com --redirect || true
            
            chmod +x "$APP_DIR/deploy.sh"
            "$APP_DIR/deploy.sh"

                        # Set admin role for site owner
            sleep 5
            docker compose -f "$APP_DIR/docker-compose.yml" exec -T db psql -U csc_admin -d smit_csc -c "UPDATE users SET role='admin' WHERE email='smitcscinfoyt@gmail.com';"
