name: Deploy to Oracle VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR="$HOME/smit-csc-info"

            # Clone repo if not exists, else pull latest
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/smitcscinfoyt/smit-csc-info.git "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin
              git reset --hard origin/main
              git clean -fd
            fi

            cd "$APP_DIR"

            # Write .env file
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            ENVEOF

            # Append secrets
            echo "SITE_URL=${{ secrets.ENV_SITE_URL }}" >> .env
            echo "DATABASE_URL=${{ secrets.ENV_DATABASE_URL }}" >> .env
            echo "SESSION_SECRET=${{ secrets.ENV_SESSION_SECRET }}" >> .env
            echo "PHONEPE_MERCHANT_ID=${{ secrets.ENV_PHONEPE_MERCHANT_ID }}" >> .env
            echo "PHONEPE_CLIENT_SECRET=${{ secrets.ENV_PHONEPE_CLIENT_SECRET }}" >> .env
            echo "PHONEPE_BASE_URL=https://api.phonepe.com/apis/hermes" >> .env
            echo "PHONEPE_CLIENT_VERSION=1" >> .env

            chmod +x deploy.sh
            ./deploy.sh
