services:
  db:
    image: postgres:16-alpine
    container_name: smit_csc_db
    restart: always
    environment:
      ZOHO_EMAIL: ${ZOHO_EMAIL}
      ZOHO_PASSWORD: ${ZOHO_PASSWORD}
      POSTGRES_DB: smit_csc
      POSTGRES_USER: csc_admin
      POSTGRES_PASSWORD: secure_db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csc_admin -d smit_csc"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - csc_network

  migrate:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
      target: builder
    command: sh -c "pnpm --filter @workspace/db run push --force"
    environment:
      DATABASE_URL: postgresql://csc_admin:secure_db_password@db:5432/smit_csc
    depends_on:
      db:
        condition: service_healthy
    networks:
      - csc_network
    restart: "no"

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: smit_csc_api
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: "5000"
      DATABASE_URL: postgresql://csc_admin:secure_db_password@db:5432/smit_csc
      NODE_ENV: production
      PUBLIC_OBJECT_SEARCH_PATHS: "/tmp"
      PRIVATE_OBJECT_DIR: "/tmp"
    volumes:
      - ./attached_assets:/app/attached_assets
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - csc_network
      - proxy-net

  frontend:
    build:
      context: .
      dockerfile: artifacts/smit-csc-info/Dockerfile
    container_name: smit_csc_frontend
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./attached_assets:/usr/share/nginx/html/attached_assets:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - csc_network
      - proxy-net

volumes:
  postgres_data:

networks:
  csc_network:
    driver: bridge
  proxy-net:
    external: true
