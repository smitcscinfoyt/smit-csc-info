services:
  db:
    image: postgres:16-alpine
    container_name: smit_csc_db
    restart: always
    environment:
      POSTGRES_DB: smit_csc
      POSTGRES_USER: csc_admin
      POSTGRES_PASSWORD: secure_db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csc_admin -d smit_csc"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - csc_network

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: smit_csc_api
    restart: always
    PORT: 
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: "5000"
      DATABASE_URL: postgresql://csc_admin:secure_db_password@db:5432/smit_csc
      NODE_ENV: production
      # Add placeholders for key backend API keys if needed
      DATA_GOV_IN_API_KEY: ""
      OPENWEATHER_API_KEY: ""
      PUBLIC_OBJECT_SEARCH_PATHS: "/tmp"
      PRIVATE_OBJECT_DIR: "/tmp"
    volumes:
      # Map assets volume dynamically to keep the Docker image lightweight
      - ./attached_assets:/app/attached_assets
    depends_on:
      db:
        condition: service_healthy
    networks:
      - csc_network
      - proxy-net

  frontend:
    build:
      context: .
      dockerfile: artifacts/smit-csc-info/Dockerfile
    container_name: smit_csc_frontend
    restart: always
    ports:
      - "3000:80" 
    volumes:
      # Map assets volume read-only directly to Nginx's static folder.
      # This serves assets directly from host disk, bypassing the build image.
      - ./attached_assets:/usr/share/nginx/html/attached_assets:ro
      # Map nginx configuration dynamically so developers can tweak routes without rebuilding the image
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - csc_network
      - proxy-net

volumes:
  postgres_data:

networks:
  csc_network:
    driver: bridge
  proxy-net:
    external: true
